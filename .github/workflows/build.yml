name: Update Rankings

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "datasets>=2.19" pandas

      - name: Build rankings
        run: python build_rankings.py

      - name: Commit updated rankings
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add rankings.json previous_ranks.json
          git commit -m "Update rankings $(date +'%Y-%m-%d')" || echo "No changes"
          git push
